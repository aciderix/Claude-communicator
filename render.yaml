# Déploiement 1-clic du relais claude-comm sur Render :
# https://render.com/deploy?repo=https://github.com/aciderix/claude-communicator
#
# PERSISTANCE AUTOMATIQUE : ce blueprint cree aussi un Key Value (Redis) natif
# Render et cable sa connexion (REDIS_URL) tout seul -> l'etat survit aux
# sommeils/redemarrages, ZERO variable a saisir a la main. 100 % gratuit.
#
# (Alternative : laisser le Key Value de cote et renseigner a la place
# UPSTASH_REDIS_REST_URL / _TOKEN depuis un compte Upstash gratuit. Le relais
# detecte automatiquement le backend disponible.)
services:
  - type: web
    name: claude-comm-relay
    runtime: node
    plan: free
    buildCommand: "cd web && npm install --no-audit --no-fund && npm run build"
    startCommand: node relay.js --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: CLAUDE_COMM_RELAY_SECRET
        generateValue: true
      # Connexion au Key Value Render, injectee automatiquement (rien a saisir) :
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: claude-comm-kv
          property: connectionString
      # Alternative manuelle (Upstash) — laisser vide si on utilise le Key Value :
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  # Key Value (Redis) natif Render : persistance gratuite, cree automatiquement.
  - type: keyvalue
    name: claude-comm-kv
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []   # connexions internes uniquement (le relais y accede en interne)
