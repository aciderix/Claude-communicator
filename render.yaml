# Déploiement 1-clic du relais claude-comm sur Render :
# https://render.com/deploy?repo=https://github.com/aciderix/claude-communicator
#
# PERSISTANCE (pour que l'etat survive aux sommeils/redemarrages) :
# Render gratuit (web ET Key Value) est EPHEMERE — les donnees sont perdues
# aux redemarrages. Pour une vraie persistance GRATUITE, utilise Upstash :
#   1) upstash.com -> compte gratuit -> Create Database (Redis)
#   2) page de la base -> Connect -> copie l'URL "rediss://..."
#   3) renseigne REDIS_URL ci-dessous (Render -> Environment) avec cette URL
# Le relais detecte REDIS_URL et y sauvegarde/restaure l'etat automatiquement.
# (Sans REDIS_URL, le relais marche aussi, mais l'etat est ephemere.)
services:
  - type: web
    name: claude-comm-relay
    runtime: node
    plan: free
    buildCommand: "cd web && npm install --no-audit --no-fund && npm run build"
    startCommand: node relay.js --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: CLAUDE_COMM_RELAY_SECRET
        generateValue: true
      # Persistance gratuite : colle ici l'URL rediss:// d'une base Upstash.
      - key: REDIS_URL
        sync: false
