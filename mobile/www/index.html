<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>claude-comm</title>
<style>
  body { margin:0; padding:max(24px, env(safe-area-inset-top)) 20px 24px; background:#0d1117;
    color:#e6edf3; font:15px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  h1 { font-size:20px; margin:0 0 4px; }
  .dim { color:#8b949e; font-size:13px; }
  .mode button { display:block; width:100%; box-sizing:border-box; margin:12px 0; padding:16px 14px;
    background:#161b22; color:#e6edf3; border:1px solid #30363d; border-radius:10px;
    font:inherit; text-align:left; }
  .mode button.sel { border-color:#1f6feb; background:#11203a; }
  .mode b { display:block; margin-bottom:4px; font-size:16px; }
  label { display:block; margin:14px 0 4px; color:#8b949e; }
  input { width:100%; box-sizing:border-box; padding:10px 12px; background:#0d1117;
    color:#e6edf3; border:1px solid #30363d; border-radius:8px; font:inherit; }
  .row { display:flex; gap:10px; align-items:flex-start; margin-top:14px; }
  .row input[type=checkbox] { width:auto; margin-top:4px; }
  .hidden { display:none; }
  #go { margin-top:20px; width:100%; padding:14px; background:#1f6feb; color:#fff;
    border:none; border-radius:10px; font:inherit; font-weight:bold; }
  #status { margin-top:14px; min-height:20px; }
  #status.err { color:#f85149; }
  #info { margin-top:14px; padding:12px; background:#161b22; border:1px solid #30363d;
    border-radius:10px; word-break:break-all; }
</style>
</head>
<body>
  <h1>🛰 claude-comm</h1>
  <p class="dim">Coordination en direct de tes sessions Claude — tout se passe dans cette app, de la mise en route au dashboard.</p>

  <div class="mode">
    <button id="m-host" onclick="setMode('host')">
      <b>🏠 Héberger sur ce téléphone</b>
      <span class="dim">Le relais tourne DANS l'app (Node embarqué). Tes PC et le dashboard s'y connectent. Ni Termux, ni navigateur.</span>
    </button>
    <button id="m-client" onclick="setMode('client')">
      <b>🔌 Se connecter à un relais</b>
      <span class="dim">Cloud (Render…), PC (app de bureau) ou autre téléphone.</span>
    </button>
  </div>

  <div id="f-host" class="hidden">
    <div class="row">
      <input type="checkbox" id="expose">
      <label for="expose" style="margin:0">Exposer sur Internet (accès et sessions hors WiFi)</label>
    </div>
  </div>

  <div id="f-client" class="hidden">
    <label>URL du relais</label>
    <input id="relayUrl" placeholder="https://mon-relais.onrender.com" autocapitalize="off">
    <label>Jeton (ou laisse vide et utilise le code d'appairage au prochain écran)</label>
    <input id="token" type="password">
  </div>

  <label>Canal (un par projet)</label>
  <input id="channel" value="default" autocapitalize="off">

  <button id="go" onclick="go()">Démarrer</button>
  <div id="status"></div>
  <div id="info" class="hidden"></div>
  <pre id="debug" class="dim" style="white-space:pre-wrap;word-break:break-all;margin-top:16px;font-size:11px"></pre>

<script>
'use strict';
const $ = (id) => document.getElementById(id);
let mode = localStorage.getItem('cc_mode') || null;

function setMode(m) {
  mode = m;
  $('m-host').classList.toggle('sel', m === 'host');
  $('m-client').classList.toggle('sel', m === 'client');
  $('f-host').classList.toggle('hidden', m !== 'host');
  $('f-client').classList.toggle('hidden', m !== 'client');
}
if (mode) setMode(mode);
if (localStorage.getItem('cc_client_url')) $('relayUrl').value = localStorage.getItem('cc_client_url');
$('channel').value = localStorage.getItem('cc_channel') || 'default';

function status(text, err) {
  $('status').textContent = text;
  $('status').className = err ? 'err' : '';
}

function openDashboard(baseUrl, token, channel) {
  localStorage.setItem('cc_url', baseUrl === location.origin ? '' : baseUrl);
  if (token) localStorage.setItem('cc_token', token);
  localStorage.setItem('cc_channel', channel);
  location.href = 'dashboard.html';
}

function dbg(msg) {
  $('debug').textContent += `${new Date().toLocaleTimeString()} ${msg}\n`;
}

function nodePlugin() {
  const C = window.Capacitor;
  if (!C || !C.Plugins) return null;
  return C.Plugins.NodeJS || C.Plugins.CapacitorNodeJS || null;
}

// événements du plugin : payload natif = { args: [...] }
function unwrap(event) {
  if (event && Array.isArray(event.args)) return event.args[0];
  return event;
}

async function startHost(channel) {
  const C = window.Capacitor;
  dbg(`plugins disponibles : ${C && C.Plugins ? Object.keys(C.Plugins).join(', ') : 'aucun (Capacitor absent)'}`);
  const NodeJS = nodePlugin();
  if (!NodeJS) throw new Error("plugin Node introuvable (build incomplet de l'app)");

  // écouteurs posés AVANT toute attente pour ne rien rater
  const result = new Promise((resolve, reject) => {
    const fail = (m) => reject(new Error(m));
    const globalTimer = setTimeout(() =>
      fail('le moteur Node embarqué ne répond pas (45 s) — projet Node planté au démarrage ?'), 45000);
    NodeJS.addListener('node-ready', () => dbg('moteur Node : projet démarré ✅'));
    NodeJS.addListener('log', (e) => dbg(`node: ${unwrap(e)}`));
    NodeJS.addListener('error', (e) => {
      clearTimeout(globalTimer);
      fail(String(unwrap(e) || 'erreur du relais embarqué'));
    });
    NodeJS.addListener('started', (e) => {
      clearTimeout(globalTimer);
      resolve(unwrap(e));
    });
  });

  status('Démarrage du moteur Node embarqué…');
  dbg('whenReady()…');
  await Promise.race([
    NodeJS.whenReady(),
    new Promise((_r, rej) => setTimeout(() =>
      rej(new Error('whenReady sans réponse (30 s) : le projet Node embarqué n\'a pas émis "ready"')), 30000)),
  ]);
  dbg('whenReady ✅ — envoi de start');
  status('Démarrage du relais…');
  await NodeJS.send({ eventName: 'start', args: [{ port: 8787, expose: $('expose').checked }] });
  return result;
}

async function go() {
  status('');
  $('info').classList.add('hidden');
  const channel = $('channel').value.trim() || 'default';
  localStorage.setItem('cc_channel', channel);
  try {
    if (mode === 'host') {
      localStorage.setItem('cc_mode', 'host');
      const info = await startHost(channel);
      const lines = [`📶 Même WiFi : http://${info.lanIp || '?'}:${info.port}`];
      if (info.publicUrl) lines.push(`🌍 Internet : ${info.publicUrl}`);
      lines.push(`🔑 Jeton : ${info.secret}`);
      lines.push('(sessions PC : CLAUDE_COMM_RELAY=<url ci-dessus> CLAUDE_COMM_TOKEN=<jeton> claude)');
      $('info').innerHTML = lines.map((l) => l.replace(/</g, '&lt;')).join('<br>');
      $('info').classList.remove('hidden');
      status('Relais démarré ✅ — ouverture du dashboard dans 6 s…');
      setTimeout(() => openDashboard('http://127.0.0.1:8787', info.secret, channel), 6000);
    } else if (mode === 'client') {
      localStorage.setItem('cc_mode', 'client');
      const url = $('relayUrl').value.trim().replace(/\/+$/, '');
      if (!url) { status('URL du relais requise.', true); return; }
      localStorage.setItem('cc_client_url', url);
      openDashboard(url, $('token').value.trim(), channel);
    } else {
      status('Choisis un mode.', true);
    }
  } catch (e) {
    status(`❌ ${e.message}`, true);
  }
}
</script>
</body>
</html>
