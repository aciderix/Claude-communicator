# Construit les applications claude-comm — aucun outil local requis :
#  - bureau : Windows .exe, macOS .dmg, Linux .AppImage (Electron)
#  - mobile : Android .apk (Capacitor + Node embarqué via nodejs-mobile)
#
# Déclenchement : manuellement (onglet Actions → build-app → Run workflow)
# ou en poussant un tag v* (ex: v5.0.0). Les binaires sont disponibles
# dans les artefacts du run (et attachés à la release si tag).
name: build-app

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installer les dépendances de l'app
        working-directory: app
        run: npm install
      - name: Construire l'installeur
        working-directory: app
        run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: claude-comm-${{ matrix.os }}
          path: |
            app/dist/*.exe
            app/dist/*.dmg
            app/dist/*.AppImage
          if-no-files-found: error
      - name: Joindre à la release (si tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/*.exe
            app/dist/*.dmg
            app/dist/*.AppImage

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Dépendances Capacitor
        working-directory: mobile
        run: npm install
      - name: Assets (dashboard + relais embarqué)
        working-directory: mobile
        run: |
          node copy-assets.js
          cd www/nodejs && npm install --omit=dev
      - name: Synchronisation Capacitor
        working-directory: mobile
        run: npx cap sync android
      - name: Build APK (debug, installable par sideload)
        working-directory: mobile/android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: claude-comm-android
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Joindre à la release (si tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/android/app/build/outputs/apk/debug/app-debug.apk
